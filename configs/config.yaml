app:
  env: loc
crawler:
  target: "https://www.bilibili.com/"
  stages:
    catalog:
      worker_count: 1
      queue_size: 20
      retry:
        max_attempts: 3
        backoff: "30s"
    detail:
      worker_count: 5
      queue_size: 50
      retry:
        max_attempts: 3
        backoff: "30s"
browser:
  pool_size: 1
  max_idle_time: "5m"
  headless: false
  disable_gpu: false
  no_sandbox: false
  browser_path: "C:/Program Files/Google/Chrome/Application/chrome.exe"
proxy:
  api_url:
  refresh_interval: 300s
db:
  driver: "mysql"
  dsn: "root:123456@tcp(127.0.0.1:3306)/crawler?charset=utf8mb4&parseTime=True&loc=Local"
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 1h
  conn_max_idle_time: 10m
log:
  dir: "./logs"
  max_size: 10
monitor:   
  enabled: true
  port: 9090
scheduler:
  enabled: true
  timezone: "Asia/Shanghai"
  jobs:
    - name: "catalog_daily"
      type: "catalog"          # 对应 catalog 阶段
      schedule: "0 8 * * *"    # 每天 8:00 执行
    - name: "recover_tasks"
      type: "recover"
      schedule: "0 */6 * * *"  # 每 6 小时执行一次